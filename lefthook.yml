#
# Lefthook — git hooks that ship with the repo. Installed automatically via the `prepare` script on `pnpm install`.
#
# ─── USAGE ───────────────────────────────────────────────────────────────────────────────────────────────────────────
#
# Bypass a single hook: `LEFTHOOK_EXCLUDE=<name> git commit`
# Skip everything (use sparingly): `LEFTHOOK=0 git commit`
#
# ─── SEE ─────────────────────────────────────────────────────────────────────────────────────────────────────────────
#
# • https://lefthook.dev/configuration/
#
# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████

pre-commit:
  parallel: true
  commands:
    lint-staged:
      run: pnpm exec lint-staged

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  parallel: false
  commands:
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm typecheck
