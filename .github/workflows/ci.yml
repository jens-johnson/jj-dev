# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████
#
#                                ██        ██                     ▄▄
#                                ▀▀        ▀▀                     ██
#                              ████      ████                ▄███▄██   ▄████▄   ██▄  ▄██
#                                ██        ██               ██▀  ▀██  ██▄▄▄▄██   ██  ██
#                                ██        ██      █████    ██    ██  ██▀▀▀▀▀▀   ▀█▄▄█▀
#                                ██        ██               ▀██▄▄███  ▀██▄▄▄▄█    ████
#                                ██        ██                 ▀▀▀ ▀▀    ▀▀▀▀▀      ▀▀
#                             ████▀     ████▀
#
# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████
# █████████████████████████████████████████████ .github/workflows/ci.yml ██████████████████████████████████████████████
#
# Continuous integration GitHub action; runs lint (eslint + prettier + stylelint), typecheck, and build. Runs on every
# PR targeting main and on pushes to main. Cheap gates (lint, typecheck) run in parallel; build runs after both pass.
# Vercel handles deploys via its GitHub integration; no deploy step needed here.
#
# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████

name: 🔀 CI

# Run on pushes + PRs to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same PR if a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Specify environment values
env:
  NODE_VERSION_FILE: .nvmrc

# Jobs to be run
jobs:
  # Lint and Typecheck project files
  lint:
    name: 🧹☑️ Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 🧹 Lint (eslint + prettier + stylelint)
        run: pnpm lint
      - name: ☑️ Typecheck
        run: pnpm typecheck

  # Build the project with Nuxt
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
