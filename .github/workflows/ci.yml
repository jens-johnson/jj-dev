#                              ████      ████                ▄███▄██   ▄████▄   ██▄  ▄██
#                                ██        ██               ██▀  ▀██  ██▄▄▄▄██   ██  ██
#                                ██        ██      █████    ██    ██  ██▀▀▀▀▀▀   ▀█▄▄█▀
#                                ██        ██               ▀██▄▄███  ▀██▄▄▄▄█    ████
#                                ██        ██                 ▀▀▀ ▀▀    ▀▀▀▀▀      ▀▀
#                             ████▀     ████▀
#
# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████
# █████████████████████████████████████████████ .github/workflows/ci.yml ██████████████████████████████████████████████
#
# Continuous integration: lint and typecheck on every push to main and on all pull requests.
#
# ─── USAGE ─────────────────────────────────────────────────────────────────────────────────────────────────────────────
#
# Triggered automatically by GitHub Actions on push and pull_request events.
#
# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck
