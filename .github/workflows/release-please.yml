# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████
#
#                                ██        ██                     ▄▄
#                                ▀▀        ▀▀                     ██
#                              ████      ████                ▄███▄██   ▄████▄   ██▄  ▄██
#                                ██        ██               ██▀  ▀██  ██▄▄▄▄██   ██  ██
#                                ██        ██      █████    ██    ██  ██▀▀▀▀▀▀   ▀█▄▄█▀
#                                ██        ██               ▀██▄▄███  ▀██▄▄▄▄█    ████
#                                ██        ██                 ▀▀▀ ▀▀    ▀▀▀▀▀      ▀▀
#                             ████▀     ████▀
#
# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████
# ███████████████████████████████████████ .github/workflows/release-please.yml ████████████████████████████████████████
#
# Automated release management via release-please. On every push to main, release-please
# inspects conventional commits since the last release and either opens or updates a
# "Release PR". Merging that PR bumps package.json version and publishes a GitHub Release
# with a generated CHANGELOG.md entry.
#
# ─── SEE ─────────────────────────────────────────────────────────────────────────────────────────────────────────────
#
# • https://github.com/googleapis/release-please-action
# • https://github.com/googleapis/release-please
#
# ─── SETUP: PROMOTE_PAT secret (recommended, shared with promote-staging.yml) ────────────────────────────────────────
#
# release-please opens a "Release PR" with auto-bumped version + CHANGELOG. If created via the default GITHUB_TOKEN,
# downstream workflows (CI) won't trigger on that PR — same recursion-prevention restriction documented in
# promote-staging.yml. Set a repo secret `PROMOTE_PAT` (single fine-grained PAT, see promote-staging.yml header for
# creation steps) to fix that. Without it the workflow still runs, just won't trigger downstream checks on the PR.
#
# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████

name: Release Please

on:
  push:
    branches: [main]

# release-please needs to open/update the Release PR and create GitHub Releases.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.PROMOTE_PAT || secrets.GITHUB_TOKEN }}
