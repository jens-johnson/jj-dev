# ─── deploy.yml ──────────────────────────────────────────────────────────────
# Deploy to Vercel on every push to main (production) and on pull requests
# (preview). Uses Nitro's Vercel preset to build directly into the Vercel
# Build Output API format (.vercel/output), then deploys with --prebuilt.
#
# Required secrets (set in GitHub → Settings → Secrets → Actions):
#   VERCEL_TOKEN      — from vercel.com/account/tokens
#   VERCEL_ORG_ID     — from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID — from .vercel/project.json after `vercel link`

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (Nitro Vercel preset)
        run: npm run build
        env:
          NITRO_PRESET: vercel

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
