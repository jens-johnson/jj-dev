# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████
#
#                                ██        ██                     ▄▄
#                                ▀▀        ▀▀                     ██
#                              ████      ████                ▄███▄██   ▄████▄   ██▄  ▄██
#                                ██        ██               ██▀  ▀██  ██▄▄▄▄██   ██  ██
#                                ██        ██      █████    ██    ██  ██▀▀▀▀▀▀   ▀█▄▄█▀
#                                ██        ██               ▀██▄▄███  ▀██▄▄▄▄█    ████
#                                ██        ██                 ▀▀▀ ▀▀    ▀▀▀▀▀      ▀▀
#                             ████▀     ████▀
#
# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████
# ███████████████████████████████████████████ .github/workflows/deploy.yml ████████████████████████████████████████████
#
# Deploy to Vercel on every push to main (production) and on pull requests (preview).
#
# ─── USAGE ─────────────────────────────────────────────────────────────────────────────────────────────────────────────
#
# Triggered automatically by GitHub Actions. Requires three repository secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
#
# ─── SEE ───────────────────────────────────────────────────────────────────────────────────────────────────────────────
#
# • https://vercel.com/docs/deployments/deploy-hooks
#
# █████████████████████████████████████████████████████████████████████████████████████████████████████████████████████
name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    # Skip for Dependabot PRs — they cannot access repository secrets by design,
    # so the Vercel deploy would always fail. CI (lint + typecheck) is sufficient
    # for dependency-update PRs.
    if: github.actor != 'dependabot[bot]'
    # Reference the GitHub environment so protection rules and environment-scoped
    # secrets are applied. Resolves to 'production' on main, 'preview' on PRs.
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (Nitro Vercel preset)
        run: npm run build
        env:
          NITRO_PRESET: vercel

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
